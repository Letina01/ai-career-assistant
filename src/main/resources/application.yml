server:
  port: 8080

spring:
  application:
    name: ai-career-assistant
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/career_assistant}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}

ai:
  provider: ${AI_PROVIDER:gemini}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    url: ${OPENAI_URL:https://api.openai.com/v1/chat/completions}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
    url: ${GEMINI_URL:https://generativelanguage.googleapis.com/v1beta/models}

jobs:
  provider: ${JOB_PROVIDER:rapidapi}
  rapidapi:
    key: ${RAPIDAPI_KEY:}
    host: ${RAPIDAPI_HOST:jsearch.p.rapidapi.com}
    url: ${RAPIDAPI_URL:https://jsearch.p.rapidapi.com/search}

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-change-this-secret-key}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

app:
  allowed-origins: ${APP_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}
  email:
    enabled: ${APP_EMAIL_ENABLED:false}
    from: ${APP_EMAIL_FROM:no-reply@careerassistant.local}
